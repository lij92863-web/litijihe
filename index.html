<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F7F8FA;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas {
    display: block;
    cursor: grab;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
  canvas:active { cursor: grabbing; }
  canvas.dragging-rod { cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  /* ================================================================
     GEOMETRY CONSTANTS — IMMUTABLE
     Square prism: base side = 1, height = 2
     D1=(0,0,0) C1=(1,0,0) A1=(0,1,0) B1=(1,1,0)
     D =(0,0,2) C =(1,0,2) A =(0,1,2) B =(1,1,2)
     |PD1| = sqrt(5)
     ================================================================ */
  var ROD_RADIUS = Math.sqrt(5);

  /* ---------- handfeel parameters ---------- */
  var ROD_SMOOTHING_DRAG  = 0.48;
  var ROD_SMOOTHING_IDLE  = 0.22;
  var SCENE_SMOOTHING     = 0.16;
  var TRACE_THRESHOLD     = 0.22;
  var TRACE_BRUSH_RADIUS  = 5;
  var TRACE_SWEEP_STEPS   = 16;

  /* ---------- immutable world coordinates ---------- */
  var POINTS = {
    D1: {x: 0, y: 0, z: 0},
    C1: {x: 1, y: 0, z: 0},
    A1: {x: 0, y: 1, z: 0},
    B1: {x: 1, y: 1, z: 0},
    D:  {x: 0, y: 0, z: 2},
    C:  {x: 1, y: 0, z: 2},
    A:  {x: 0, y: 1, z: 2},
    B:  {x: 1, y: 1, z: 2}
  };

  var MODEL_CENTER = {x: 0.5, y: 0.5, z: 1};

  /* ---------- edges: 12 line segments, no crossing ---------- */
  var EDGES = [
    /* bottom D1-C1-B1-A1-D1 */
    ["D1", "C1"], ["C1", "B1"], ["B1", "A1"], ["A1", "D1"],
    /* top D-C-B-A-D */
    ["D", "C"], ["C", "B"], ["B", "A"], ["A", "D"],
    /* vertical */
    ["D1", "D"], ["C1", "C"], ["B1", "B"], ["A1", "A"]
  ];

  /* ---------- 6 faces, correct winding ---------- */
  var FACES = [
    {name:"bottom", points:["D1","C1","B1","A1"], color:"rgba(220,230,242,0.18)"},
    {name:"top",    points:["D","C","B","A"],     color:"rgba(220,230,242,0.18)"},
    {name:"x0",     points:["D1","A1","A","D"],   color:"rgba(220,230,242,0.14)"},
    {name:"x1",     points:["C1","B1","B","C"],   color:"rgba(220,230,242,0.16)"},
    {name:"y0",     points:["D1","C1","C","D"],   color:"rgba(220,230,242,0.16)"},
    {name:"y1",     points:["A1","B1","B","A"],   color:"rgba(220,230,242,0.16)"}
  ];

  /* ---------- arc colors ---------- */
  var ARC_COLORS = {top: '#FF8A2A', sideX: '#7C4DFF', sideY: '#20B26B'};

  /* ================================================================
     VECTOR MATH (object-based {x,y,z})
     ================================================================ */
  function normalize3(v) {
    var len = Math.hypot(v.x, v.y, v.z) || 1;
    return {x: v.x / len, y: v.y / len, z: v.z / len};
  }
  function add3(a, b) { return {x: a.x + b.x, y: a.y + b.y, z: a.z + b.z}; }
  function scale3(v, s) { return {x: v.x * s, y: v.y * s, z: v.z * s}; }
  function dot3(a, b) { return a.x * b.x + a.y * b.y + a.z * b.z; }
  function dist3(a, b) { return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z); }

  function slerpDirection(a, b, t) {
    var an = normalize3(a);
    var bn = normalize3(b);
    var cos = dot3(an, bn);
    cos = Math.max(-1, Math.min(1, cos));
    if (cos > 0.9995) {
      return normalize3({x: an.x + (bn.x - an.x) * t, y: an.y + (bn.y - an.y) * t, z: an.z + (bn.z - an.z) * t});
    }
    var theta = Math.acos(cos);
    var sinTheta = Math.sin(theta);
    var w1 = Math.sin((1 - t) * theta) / sinTheta;
    var w2 = Math.sin(t * theta) / sinTheta;
    return normalize3({x: an.x * w1 + bn.x * w2, y: an.y * w1 + bn.y * w2, z: an.z * w1 + bn.z * w2});
  }

  /* ================================================================
     ARC SAMPLING
     ================================================================ */
  var N_SAMPLES = 250;
  function sampleArc(type, n) {
    var pts = [], i, theta;
    if (type === 'top') {
      for (i = 0; i <= n; i++) { theta = (i/n)*(Math.PI/2); pts.push({x:Math.cos(theta), y:Math.sin(theta), z:2}); }
    } else if (type === 'sideX') {
      for (i = 0; i <= n; i++) { theta = (i/n)*(Math.PI/6); pts.push({x:1, y:2*Math.sin(theta), z:2*Math.cos(theta)}); }
    } else if (type === 'sideY') {
      for (i = 0; i <= n; i++) { theta = (i/n)*(Math.PI/6); pts.push({x:2*Math.sin(theta), y:1, z:2*Math.cos(theta)}); }
    }
    return pts;
  }
  var arcSamples = {top: sampleArc('top', N_SAMPLES), sideX: sampleArc('sideX', N_SAMPLES), sideY: sampleArc('sideY', N_SAMPLES)};

  /* ================================================================
     STATE
     ================================================================ */
  var state = {
    yaw: -0.65, pitch: 0.55,
    targetYaw: -0.65, targetPitch: 0.55,
    scale: 230,
    width: 0, height: 0,
    draggingScene: false, draggingRod: false,
    lastPointer: {x:0, y:0},
    rodDirection: normalize3({x:0.72, y:0.38, z:0.58}),
    targetDirection: normalize3({x:0.72, y:0.38, z:0.58}),
    rodEnd: {x:0, y:0, z:0},
    prevRodEnd: null,
    activeArc: null,
    visitedTop: [], visitedSideX: [], visitedSideY: []
  };

  /* ================================================================
     DOM
     ================================================================ */
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

  /* ================================================================
     RESIZE — DPR-aware
     ================================================================ */
  function resize() {
    var dpr = window.devicePixelRatio || 1;
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.width  = w;
    state.height = h;
  }

  /* ================================================================
     3D ROTATION + ORTHOGRAPHIC PROJECTION
     ================================================================ */
  function rotateView(p) {
    var cx = p.x - MODEL_CENTER.x;
    var cy = p.y - MODEL_CENTER.y;
    var cz = p.z - MODEL_CENTER.z;
    var cosY = Math.cos(state.yaw), sinY = Math.sin(state.yaw);
    var cosP = Math.cos(state.pitch), sinP = Math.sin(state.pitch);
    /* Rz(yaw) */
    var x1 = cx * cosY - cy * sinY;
    var y1 = cx * sinY + cy * cosY;
    var z1 = cz;
    /* Rx(pitch) */
    var x2 = x1;
    var y2 = y1 * cosP - z1 * sinP;
    var z2 = y1 * sinP + z1 * cosP;
    return {x: x2, y: y2, z: z2};
  }

  function project(p) {
    var r = rotateView(p);
    return {
      x: state.width / 2 + r.x * state.scale,
      y: state.height / 2 - r.z * state.scale,
      depth: r.y
    };
  }

  /* ================================================================
     VECTOR ROTATION (no centering — for directions, not points)
     ================================================================ */
  function rotateVector(v) {
    var cosY = Math.cos(state.yaw), sinY = Math.sin(state.yaw);
    var cosP = Math.cos(state.pitch), sinP = Math.sin(state.pitch);
    var x1 = v.x * cosY - v.y * sinY;
    var y1 = v.x * sinY + v.y * cosY;
    var z1 = v.z;
    var x2 = x1;
    var y2 = y1 * cosP - z1 * sinP;
    var z2 = y1 * sinP + z1 * cosP;
    return {x: x2, y: y2, z: z2};
  }

  function unrotateVector(v) {
    var cosY = Math.cos(state.yaw), sinY = Math.sin(state.yaw);
    var cosP = Math.cos(state.pitch), sinP = Math.sin(state.pitch);
    /* inverse Rx */
    var x1 = v.x;
    var y1 = v.y * cosP + v.z * sinP;
    var z1 = -v.y * sinP + v.z * cosP;
    /* inverse Rz */
    var x0 = x1 * cosY + y1 * sinY;
    var y0 = -x1 * sinY + y1 * cosY;
    var z0 = z1;
    return {x: x0, y: y0, z: z0};
  }

  /* ================================================================
     MAP POINTER TO VIRTUAL SPHERE — direct, no delta accumulation
     ================================================================ */
  function updateTargetRodFromPointer(pointer) {
    var d1Screen = project(POINTS.D1);

    /* pointer offset from D1 in view space */
    var vx = (pointer.x - d1Screen.x) / state.scale;
    var vz = -(pointer.y - d1Screen.y) / state.scale;

    var r = ROD_RADIUS;
    var screenLen2 = vx * vx + vz * vz;
    var max2 = r * r * 0.999;

    /* clamp to virtual-sphere screen projection circle */
    if (screenLen2 > max2) {
      var scl = Math.sqrt(max2 / screenLen2);
      vx *= scl;
      vz *= scl;
      screenLen2 = vx * vx + vz * vz;
    }

    var vyAbs = Math.sqrt(Math.max(0, r * r - screenLen2));

    /* pick depth sign closest to current rod direction to avoid hemisphere flip */
    var currentView = rotateVector(scale3(state.targetDirection, ROD_RADIUS));
    var vyA = vyAbs;
    var vyB = -vyAbs;
    var vy = Math.abs(currentView.y - vyA) <= Math.abs(currentView.y - vyB) ? vyA : vyB;

    var viewVec = {x: vx, y: vy, z: vz};
    var worldVec = unrotateVector(viewVec);

    state.targetDirection = normalize3(worldVec);
  }

  /* ================================================================
     DRAW: transparent faces — sorted by depth, far to near
     ================================================================ */
  function drawFaces() {
    var faceData = [];
    for (var f = 0; f < FACES.length; f++) {
      var face = FACES[f];
      var projected = [];
      var sumDepth = 0;
      for (var v = 0; v < face.points.length; v++) {
        var pp = project(POINTS[face.points[v]]);
        projected.push(pp);
        sumDepth += pp.depth;
      }
      faceData.push({color: face.color, projected: projected, avgDepth: sumDepth / face.points.length});
    }
    faceData.sort(function(a, b) { return a.avgDepth - b.avgDepth; });

    for (f = 0; f < faceData.length; f++) {
      var fv = faceData[f];
      ctx.beginPath();
      ctx.moveTo(fv.projected[0].x, fv.projected[0].y);
      for (v = 1; v < fv.projected.length; v++) {
        ctx.lineTo(fv.projected[v].x, fv.projected[v].y);
      }
      ctx.closePath();
      ctx.fillStyle = fv.color;
      ctx.fill();
    }
  }

  /* ================================================================
     DRAW: edges — only from EDGES table
     ================================================================ */
  function drawEdges() {
    ctx.strokeStyle = '#334155';
    ctx.lineWidth   = 2.2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    for (var e = 0; e < EDGES.length; e++) {
      var p1 = project(POINTS[EDGES[e][0]]);
      var p2 = project(POINTS[EDGES[e][1]]);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
  }

  /* ================================================================
     DRAW: D1 point + label (the ONLY visible text)
     ================================================================ */
  function drawD1() {
    var p = project(POINTS.D1);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#E53935';
    ctx.fill();
    ctx.font = '600 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#E53935';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('D1', p.x + 11, p.y - 9);
  }

  /* ================================================================
     DRAW: blue rod from D1 to rodEnd
     ================================================================ */
  function drawRod() {
    var p1 = project(POINTS.D1);
    var p2 = project(state.rodEnd);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = '#2563EB';
    ctx.lineWidth   = 3.5;
    ctx.lineCap     = 'round';
    ctx.stroke();
  }

  /* ================================================================
     DRAW: red draggable endpoint
     ================================================================ */
  function drawRodEnd() {
    var p = project(state.rodEnd);
    var grad = ctx.createRadialGradient(p.x, p.y, 3, p.x, p.y, 14);
    grad.addColorStop(0, 'rgba(239,68,68,0.5)');
    grad.addColorStop(1, 'rgba(239,68,68,0)');
    ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x, p.y, 9, 0, Math.PI*2); ctx.fillStyle = '#EF4444'; ctx.fill();
  }

  /* ================================================================
     DRAW: coloured scratch trails (only visited segments)
     ================================================================ */
  function drawScratches() {
    var arcDefs = [
      {pts: arcSamples.top,   visited: state.visitedTop,   color: ARC_COLORS.top},
      {pts: arcSamples.sideX, visited: state.visitedSideX, color: ARC_COLORS.sideX},
      {pts: arcSamples.sideY, visited: state.visitedSideY, color: ARC_COLORS.sideY}
    ];
    for (var a = 0; a < arcDefs.length; a++) {
      var pts = arcDefs[a].pts, visited = arcDefs[a].visited, color = arcDefs[a].color;
      var segStart = -1;
      for (var i = 0; i < pts.length; i++) {
        if (visited[i]) { if (segStart < 0) segStart = i; }
        else { if (segStart >= 0) { drawArcSegment(pts, segStart, i-1, color); segStart = -1; } }
      }
      if (segStart >= 0) { drawArcSegment(pts, segStart, pts.length-1, color); }
    }
  }
  function drawArcSegment(pts, start, end, color) {
    if (end - start < 1) return;
    ctx.beginPath();
    var p0 = project(pts[start]); ctx.moveTo(p0.x, p0.y);
    for (var i = start+1; i <= end; i++) { var pi = project(pts[i]); ctx.lineTo(pi.x, pi.y); }
    ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
  }

  /* ================================================================
     MAIN DRAW — order: bg → faces → scratches → edges → rod → D1 → endpoint
     ================================================================ */
  function draw() {
    ctx.clearRect(0, 0, state.width, state.height);
    ctx.fillStyle = '#F7F8FA';
    ctx.fillRect(0, 0, state.width, state.height);
    drawFaces();
    drawScratches();
    drawEdges();
    drawRod();
    drawD1();
    drawRodEnd();
  }

  /* ================================================================
     TRACE — only marks visited, NEVER locks rod
     ================================================================ */
  function findNearestArcPoint(point) {
    var best = null;
    function scan(name, samples) {
      for (var i = 0; i < samples.length; i++) {
        var d = dist3(point, samples[i]);
        if (!best || d < best.distance) { best = {arcName:name, index:i, point:samples[i], distance:d}; }
      }
    }
    scan('top', arcSamples.top); scan('sideX', arcSamples.sideX); scan('sideY', arcSamples.sideY);
    return best;
  }
  function markVisited(arcName, index) {
    var visited;
    if (arcName === 'top') visited = state.visitedTop;
    else if (arcName === 'sideX') visited = state.visitedSideX;
    else if (arcName === 'sideY') visited = state.visitedSideY;
    else return;
    for (var k = -TRACE_BRUSH_RADIUS; k <= TRACE_BRUSH_RADIUS; k++) {
      var j = index + k;
      if (j >= 0 && j < visited.length) visited[j] = true;
    }
  }
  function traceIfNearValidArc(rodEnd) {
    var nearest = findNearestArcPoint(rodEnd);
    if (!nearest || nearest.distance > TRACE_THRESHOLD) { state.activeArc = null; return; }
    state.activeArc = nearest.arcName;
    markVisited(nearest.arcName, nearest.index);
  }

  /* ================================================================
     SWEPT TRACE — interpolates between frames, never locks rod
     ================================================================ */
  function traceSweptRod(fromPoint, toPoint) {
    if (!fromPoint || !toPoint) {
      traceIfNearValidArc(toPoint);
      return;
    }
    for (var s = 0; s <= TRACE_SWEEP_STEPS; s++) {
      var t = s / TRACE_SWEEP_STEPS;
      var p = {
        x: fromPoint.x + (toPoint.x - fromPoint.x) * t,
        y: fromPoint.y + (toPoint.y - fromPoint.y) * t,
        z: fromPoint.z + (toPoint.z - fromPoint.z) * t
      };
      traceIfNearValidArc(p);
    }
  }

  /* ================================================================
     ROD LENGTH ENFORCEMENT — rodEnd ALWAYS sqrt(5) from D1
     ================================================================ */
  function enforceRodLength() {
    state.rodDirection = normalize3(state.rodDirection);
    state.targetDirection = normalize3(state.targetDirection);
    state.rodEnd = scale3(state.rodDirection, ROD_RADIUS);
    var actual = Math.hypot(state.rodEnd.x, state.rodEnd.y, state.rodEnd.z);
    if (Math.abs(actual - ROD_RADIUS) > 1e-6) {
      console.error("D1P length broken:", actual, "expected:", ROD_RADIUS);
    }
  }

  function selfCheckRodLength() {
    var len = Math.hypot(state.rodEnd.x, state.rodEnd.y, state.rodEnd.z);
    if (Math.abs(len - ROD_RADIUS) > 1e-6) {
      throw new Error("Rod length is not fixed sqrt(5): " + len);
    }
  }

  /* ================================================================
     INTERACTION HANDLERS
     ================================================================ */
  function getCanvasPoint(e) {
    var rect = canvas.getBoundingClientRect();
    return {x: e.clientX - rect.left, y: e.clientY - rect.top};
  }
  function handlePointerDown(e) {
    e.preventDefault();
    var p = getCanvasPoint(e);
    state.lastPointer = p;
    var pr = project(state.rodEnd);
    var ddx = p.x - pr.x, ddy = p.y - pr.y;
    if (Math.sqrt(ddx*ddx + ddy*ddy) < 36) {
      state.draggingRod = true; state.draggingScene = false;
      if (canvas.setPointerCapture) { try { canvas.setPointerCapture(e.pointerId); } catch (err) {} }
      updateTargetRodFromPointer(p);
      canvas.classList.add('dragging-rod');
      return;
    }
    state.draggingScene = true; state.draggingRod = false;
    if (canvas.setPointerCapture) { try { canvas.setPointerCapture(e.pointerId); } catch (err) {} }
    canvas.style.cursor = 'grabbing';
  }
  function handlePointerMove(e) {
    e.preventDefault();
    var p = getCanvasPoint(e);
    var dx = p.x - state.lastPointer.x;
    var dy = p.y - state.lastPointer.y;
    state.lastPointer = p;
    if (state.draggingRod) {
      updateTargetRodFromPointer(p);
      return;
    }
    if (state.draggingScene) {
      var maxDelta = 32;
      dx = Math.max(-maxDelta, Math.min(maxDelta, dx));
      dy = Math.max(-maxDelta, Math.min(maxDelta, dy));
      state.targetYaw   += dx * 0.0045;
      state.targetPitch += dy * 0.0045;
      if (state.targetPitch >  1.15) state.targetPitch =  1.15;
      if (state.targetPitch < -1.15) state.targetPitch = -1.15;
    }
  }
  function handlePointerUp(e) {
    state.draggingRod = false;
    state.draggingScene = false;
    canvas.classList.remove('dragging-rod');
    canvas.style.cursor = '';
    if (canvas.releasePointerCapture) {
      try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
    }
  }
  function handleWheel(e) {
    e.preventDefault();
    state.scale += e.deltaY * -0.12;
    if (state.scale < 80) state.scale = 80;
    if (state.scale > 380) state.scale = 380;
  }

  /* ================================================================
     GEOMETRY SELF-CHECKS
     ================================================================ */
  function assertClose(actual, expected, eps, message) {
    if (Math.abs(actual - expected) > eps) { throw new Error(message + ': ' + actual + ' !== ' + expected); }
  }
  function lengthBetween(a, b) {
    var p = POINTS[a], q = POINTS[b];
    return Math.hypot(p.x - q.x, p.y - q.y, p.z - q.z);
  }
  function selfCheckPrismGeometry() {
    /* bottom: all sides = 1 */
    assertClose(lengthBetween("D1","C1"), 1, 1e-9, "D1C1");
    assertClose(lengthBetween("C1","B1"), 1, 1e-9, "C1B1");
    assertClose(lengthBetween("B1","A1"), 1, 1e-9, "B1A1");
    assertClose(lengthBetween("A1","D1"), 1, 1e-9, "A1D1");
    /* top: all sides = 1 */
    assertClose(lengthBetween("D","C"), 1, 1e-9, "DC");
    assertClose(lengthBetween("C","B"), 1, 1e-9, "CB");
    assertClose(lengthBetween("B","A"), 1, 1e-9, "BA");
    assertClose(lengthBetween("A","D"), 1, 1e-9, "AD");
    /* vertical: all = 2 */
    assertClose(lengthBetween("D1","D"), 2, 1e-9, "D1D");
    assertClose(lengthBetween("C1","C"), 2, 1e-9, "C1C");
    assertClose(lengthBetween("B1","B"), 2, 1e-9, "B1B");
    assertClose(lengthBetween("A1","A"), 2, 1e-9, "A1A");
  }
  function selfCheckGeometry() {
    var i, pt, dist;
    /* topArc: z=2, |pt|=sqrt(5) */
    for (i = 0; i < arcSamples.top.length; i++) {
      pt = arcSamples.top[i]; dist = Math.hypot(pt.x, pt.y, pt.z);
      if (Math.abs(pt.z - 2) > 0.002 || Math.abs(dist - ROD_RADIUS) > 0.002) return false;
    }
    /* sideXArc: x=1, |pt|=sqrt(5) */
    for (i = 0; i < arcSamples.sideX.length; i++) {
      pt = arcSamples.sideX[i]; dist = Math.hypot(pt.x, pt.y, pt.z);
      if (Math.abs(pt.x - 1) > 0.002 || Math.abs(dist - ROD_RADIUS) > 0.002) return false;
    }
    /* sideYArc: y=1, |pt|=sqrt(5) */
    for (i = 0; i < arcSamples.sideY.length; i++) {
      pt = arcSamples.sideY[i]; dist = Math.hypot(pt.x, pt.y, pt.z);
      if (Math.abs(pt.y - 1) > 0.002 || Math.abs(dist - ROD_RADIUS) > 0.002) return false;
    }
    return true;
  }

  /* ================================================================
     ANIMATION LOOP — smooth scene + rod following
     ================================================================ */
  function animate() {
    requestAnimationFrame(animate);
    state.yaw   += (state.targetYaw   - state.yaw)   * SCENE_SMOOTHING;
    state.pitch += (state.targetPitch - state.pitch) * SCENE_SMOOTHING;
    var smooth = state.draggingRod ? ROD_SMOOTHING_DRAG : ROD_SMOOTHING_IDLE;
    state.rodDirection = slerpDirection(state.rodDirection, state.targetDirection, smooth);
    state.rodDirection = normalize3(state.rodDirection);
    state.targetDirection = normalize3(state.targetDirection);
    var nextRodEnd = scale3(state.rodDirection, ROD_RADIUS);
    traceSweptRod(state.prevRodEnd, nextRodEnd);
    state.rodEnd = nextRodEnd;
    state.prevRodEnd = {x: nextRodEnd.x, y: nextRodEnd.y, z: nextRodEnd.z};
    enforceRodLength();
    draw();
  }

  /* ================================================================
     INIT
     ================================================================ */
  function init() {
    resize();
    for (var k = 0; k <= N_SAMPLES; k++) {
      state.visitedTop.push(false); state.visitedSideX.push(false); state.visitedSideY.push(false);
    }
    state.rodDirection = normalize3(state.rodDirection);
    state.targetDirection = normalize3(state.targetDirection);
    state.rodEnd = scale3(state.rodDirection, ROD_RADIUS);
    state.prevRodEnd = {x: state.rodEnd.x, y: state.rodEnd.y, z: state.rodEnd.z};
    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointerleave', handlePointerUp);
    canvas.addEventListener('wheel', handleWheel, {passive: false});
    canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    window.addEventListener('resize', function() { resize(); draw(); });
    selfCheckPrismGeometry();
    selfCheckRodLength();
    if (!selfCheckGeometry()) { /* should never fail */ }
    animate();
  }
  init();
})();
</script>
</body>
